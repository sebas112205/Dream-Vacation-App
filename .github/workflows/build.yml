name: Build and Push Docker Images

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  docker:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service:
          - name: backend
            context: ./backend
            dockerfile: ./backend/Dockerfile
            image: dream-vacation-backend
          - name: frontend
            context: ./frontend
            dockerfile: ./frontend/Dockerfile
            image: dream-vacation-frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract short SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Build image
        run: |
          docker build \
            -f ${{ matrix.service.dockerfile }} \
            -t ${{ secrets.DOCKER_USER }}/${{ matrix.service.image }}:${{ steps.vars.outputs.sha_short }} \
            -t ${{ secrets.DOCKER_USER }}/${{ matrix.service.image }}:latest \
            ${{ matrix.service.context }}

      - name: Push image
        run: |
          docker push ${{ secrets.DOCKER_USER }}/${{ matrix.service.image }}:${{ steps.vars.outputs.sha_short }}
          docker push ${{ secrets.DOCKER_USER }}/${{ matrix.service.image }}:latest
